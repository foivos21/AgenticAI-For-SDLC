name: ${COMPOSE_PROJECT_NAME:-agentic_ai_sdlc}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      RAILWAY_VOLUME_MOUNT_PATH: /app/data
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      RESET_DATA_ON_STARTUP: ${RESET_DATA_ON_STARTUP:-false}
      RUN_SEEDS_ON_STARTUP: ${RUN_SEEDS_ON_STARTUP:-true}
      # Keep backend self-references aligned with host-published port.
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://127.0.0.1:${BACKEND_HOST_PORT:-18000}}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Browser-side URLs should point to host-published backend address.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:${BACKEND_HOST_PORT:-18000}}
      VITE_PIPELINE_API_BASE_URL: ${VITE_PIPELINE_API_BASE_URL:-http://127.0.0.1:${BACKEND_HOST_PORT:-18000}}
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_HOST_PORT:-15173}:5173"

volumes:
  backend_data:
